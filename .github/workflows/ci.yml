name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit --coverage

      - name: Run integration tests
        run: pnpm test:integration

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [type-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build && node -e "
          const fs = require('fs');
          const path = require('path');
          const dir = 'dist/_astro';
          if (!fs.existsSync(dir)) { console.log('No dist/_astro found'); process.exit(0); }
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.js'));
          const totalBytes = files.reduce((sum, f) => sum + fs.statSync(path.join(dir, f)).size, 0);
          const totalKb = Math.round(totalBytes / 1024);
          const MAX_KB = 600;
          console.log('JS bundle: ' + totalKb + 'kb (limit: ' + MAX_KB + 'kb)');
          if (totalKb > MAX_KB) { console.error('Bundle too large: ' + totalKb + 'kb > ' + MAX_KB + 'kb'); process.exit(1); }
        "
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CAKTO_WEBHOOK_SECRET: ${{ secrets.CAKTO_WEBHOOK_SECRET }}
          PUBLIC_CAKTO_CHECKOUT_URL_VIDEOAULAS: ${{ secrets.PUBLIC_CAKTO_CHECKOUT_URL_VIDEOAULAS }}
          PUBLIC_CAKTO_CHECKOUT_URL_MENTORIA: ${{ secrets.PUBLIC_CAKTO_CHECKOUT_URL_MENTORIA }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PUBLIC_SITE_URL: http://localhost:4321

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CAKTO_WEBHOOK_SECRET: ${{ secrets.CAKTO_WEBHOOK_SECRET }}
          PUBLIC_CAKTO_CHECKOUT_URL_VIDEOAULAS: ${{ secrets.PUBLIC_CAKTO_CHECKOUT_URL_VIDEOAULAS }}
          PUBLIC_CAKTO_CHECKOUT_URL_MENTORIA: ${{ secrets.PUBLIC_CAKTO_CHECKOUT_URL_MENTORIA }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PUBLIC_SITE_URL: http://localhost:4321

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
